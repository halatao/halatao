name: Deploy static Next.js site to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: npm ci

      - name: Validate content
        run: npm run validate:content

      - name: Validate redirects
        run: npm run validate:redirects

      - name: Generate Worker redirect map
        run: npm run generate:worker-redirects

      - name: Check committed Worker redirect map is current
        run: git diff --exit-code -- worker/generated/redirects.json

      - name: Validate generated Worker redirect map
        run: npm run validate:worker-redirects

      - name: Test Worker
        run: npm run test:worker

      - name: Build Worker without deploying
        run: npm run build:worker

      - name: Lint
        run: npm run lint

      - name: Build site
        run: npm run build
        env:
          STATIC_EXPORT: "true"

      - name: Validate generated SEO output
        run: npm run validate:seo

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

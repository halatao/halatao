name: Deploy Cloudflare redirect Worker

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Worker environment to deploy
        required: true
        type: choice
        options:
          - staging
          - production
      production_confirmation:
        description: Type DEPLOY_PRODUCTION when selecting production
        required: false
        type: string

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run validate:redirects
      - run: npm run generate:worker-redirects
      - run: git diff --exit-code -- worker/generated/redirects.json
      - run: npm run validate:worker-redirects
      - run: npm run test:worker
      - run: npm run build:worker

  deploy:
    needs: validate
    runs-on: ubuntu-latest
    environment: cloudflare-${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run generate:worker-redirects
      - name: Require explicit production confirmation
        if: inputs.environment == 'production' && inputs.production_confirmation != 'DEPLOY_PRODUCTION'
        run: |
          echo "Production deployment requires DEPLOY_PRODUCTION confirmation."
          exit 1
      - name: Deploy selected Worker environment
        run: npx wrangler deploy --env "${{ inputs.environment }}"
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
